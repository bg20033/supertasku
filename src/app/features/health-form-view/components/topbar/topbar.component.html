<div class="flex flex-col gap-5 md:gap-6">
  <div class="grid grid-cols-[2.25rem_minmax(0,1fr)_2.25rem] items-center gap-3">
    <span aria-hidden="true"></span>

    <h1
      class="text-center text-[24px] font-normal tracking-[-0.03em] text-white"
    >
      Gesundheitsdeklaration
    </h1>

    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-transparent text-white/95 transition hover:bg-white/8"
      aria-label="Menue"
    >
      <img src="assets/Icon-menu-alt-3.svg" alt="" class="h-4 w-4" />
    </button>
  </div>

  <div class="topbar-scroll overflow-x-auto pb-2">
    <div class="min-w-max rounded-3xl border border-[#d2c2e4] bg-[#f3edf8] px-2 pt-3">
      <div class="flex items-end gap-1.5 md:gap-3">
        @for (tab of personTabs(); track trackByTab($index, tab)) {
          <button
            data-person-tab
            type="button"
            class="relative flex min-w-[5.9rem] flex-1 flex-col items-center gap-1 rounded-[0.95rem] px-2 pt-1.5 text-center transition-all duration-200"
            [disabled]="!tab.canOpen"
            [ngClass]="{
              ' ': tab.state === 'active',
              'opacity-45 grayscale cursor-not-allowed': !tab.canOpen,
              'cursor-pointer hover:-translate-y-0.5': tab.canOpen && tab.state !== 'active',
            }"
            (click)="visitPerson(tab.index)"
          >
            @if (tab.completed) {
              <span class="text-[0.8rem] leading-none text-green-500">
                <mat-icon class="h-6! w-6! text-base! scale-165">check</mat-icon>
              </span>
            } @else {
              <span
                class="text-[0.8rem] leading-none"
                [ngClass]="{
                  'font-semibold text-slate-950': tab.state === 'active',
                  'font-medium text-slate-500': tab.state !== 'active' && tab.canOpen,
                  'font-medium text-slate-400': !tab.canOpen,
                }"
              >
                {{ tab.label }}
              </span>
            }

            <span
              class="flex h-[3.85rem] w-[3.85rem] items-end justify-center overflow-hidden rounded-[1.1rem] transition-transform duration-200"
              [class.scale-100]="tab.state === 'active'"
              [class.opacity-95]="tab.canOpen"
            >
              <img
                [ngSrc]="tab.avatarSrc"
                [alt]="tab.label"
                width="76"
                height="76"
                class="h-full w-full object-contain object-bottom"
              />
            </span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
